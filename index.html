<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="パー銀">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/bank.png">
    <title>🏦 パー銀 - PAPA BANK</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#F5F4F0;min-height:100vh;padding-bottom:72px;max-width:480px;margin:0 auto}
        .header{background:#fff;border-bottom:1px solid #E8E6E0;padding:14px 18px;position:sticky;top:0;z-index:100}
        .header-inner{display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:20px;font-weight:900;color:#1a1a1a;letter-spacing:-0.5px}
        .logo span{color:#F97316}
        .logo-sub{font-size:9px;color:#aaa;letter-spacing:1px;margin-top:1px}
        .total-area{text-align:right}
        .total-label{font-size:9px;color:#aaa}
        .total-amt{font-size:22px;font-weight:900;color:#F97316;font-variant-numeric:tabular-nums;line-height:1}
        .updated{font-size:9px;color:#ccc;margin-top:1px}
        .content{padding:14px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .son-card{background:#fff;border:2px solid transparent;border-radius:18px;padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s;-webkit-tap-highlight-color:transparent}
        .card-bg-emoji{position:absolute;bottom:-8px;right:-4px;font-size:52px;opacity:0.06;pointer-events:none}
        .card-name{font-size:15px;font-weight:900;color:#1a1a1a;margin-bottom:5px}
        .card-balance{font-size:23px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:8px}
        .rank-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #F3F4F6;border-radius:14px;padding:12px 14px;margin-bottom:8px}
        .rank-bar-bg{height:5px;background:#E5E7EB;border-radius:3px;margin-top:4px;width:100%}
        .rank-bar-fill{height:100%;border-radius:3px;transition:width 1s ease-out}
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #E5E7EB;display:flex;z-index:100}
        .nav-btn{flex:1;padding:11px 0 8px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;color:#9CA3AF}
        .nav-icon{font-size:20px}
        .nav-label{font-size:9px}
        .skeleton{background:#E5E7EB;border-radius:18px;height:140px;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.7}}
        .labor-price-table{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #E5E7EB;margin-bottom:14px;font-size:12px}
        .labor-price-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;padding:10px;border-bottom:1px solid #F3F4F6;text-align:center}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <div>
                <div class="logo">🏦 <span>パー</span>銀</div>
                <div class="logo-sub">PAPA BANK · お小遣い管理</div>
            </div>
            <div class="total-area">
                <div class="total-label">総預金残高</div>
                <div class="total-amt" id="totalAmt">¥0</div>
                <div class="updated" id="updatedAt"></div>
            </div>
        </div>
    </div>
    <div class="content" id="content"></div>
    <div class="bottom-nav">
        <button class="nav-btn" id="nav-home" onclick="navigate('home')"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></button>
        <button class="nav-btn" id="nav-ranking" onclick="navigate('ranking')"><span class="nav-icon">🏆</span><span class="nav-label">ランキング</span></button>
        <button class="nav-btn" id="nav-labor" onclick="navigate('labor')"><span class="nav-icon">🛠️</span><span class="nav-label">労働</span></button>
        <button class="nav-btn" id="nav-rules" onclick="navigate('rules')"><span class="nav-icon">📜</span><span class="nav-label">ルール</span></button>
        <button class="nav-btn" onclick="loadAll()"><span class="nav-icon">🔄</span><span class="nav-label">更新</span></button>
    </div>

                script.src = `${url}?sheet=${encodeURIComponent(sheetName)}&callback=${cb}`;
                document.head.appendChild(script);
            });
        }
