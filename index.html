// 労働シートの列定義（0始まり）

function parseNum(v){
  if(v===null||v===undefined||v==="")return 0;
  const s=String(v).replace(/[¥,\s￥]/g,"").replace(/#N\/A|#REF!|#VALUE!|#NAME\?/g,"0");
  const n=parseFloat(s);return isNaN(n)?0:Math.round(n);
}
function fmtDate(v){
  if(!v)return"";const s=String(v);
  if(s.includes("T")){const d=new Date(s);if(!isNaN(d))return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;}
  return s.replace(/"/g,"").trim();
}

function fetchSheet(sheetName){
  return new Promise((resolve,reject)=>{
    const cb="__gasCB_"+Date.now()+"_"+Math.random().toString(36).slice(2);
    const sc=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("タイムアウト"));},15000);
    function cleanup(){clearTimeout(timer);delete window[cb];sc.parentNode&&sc.parentNode.removeChild(sc);}
    window[cb]=json=>{cleanup();json&&json.data?resolve(json.data):reject(new Error(json&&json.error||"データなし"));};
    sc.onerror=()=>{cleanup();reject(new Error("通信エラー"));};
    sc.src=`${GAS_URL}?sheet=${encodeURIComponent(sheetName)}&callback=${cb}`;
    document.head.appendChild(sc);
  });
}

function extractSonData(rows,son){
  const txs=[];let latestBal=0;
  const now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);
  let start=0;
  for(let i=0;i<Math.min(rows.length,50);i++){if(String(rows[i]?.[son.colDate]||"").trim()==="日付"){start=i+1;break;}}
  for(let i=start;i<rows.length;i++){
    const r=rows[i];if(!r)continue;
    const raw=r[son.colDate];if(!raw&&raw!==0)continue;
    const d=fmtDate(raw);if(!d)continue;
    const inc=parseNum(r[son.colIncome]),wd=parseNum(r[son.colWithdraw]),bal=parseNum(r[son.colBalance]),prf=parseNum(r[son.colProfit]);
    if(bal>0)latestBal=bal;
    txs.push({date:d,income:inc,withdraw:wd,balance:bal,profit:prf});
  }
  const we=txs.filter(t=>{const d=new Date(t.date.replace(/\//g,"-"));return d>=ws&&t.income>0&&t.profit===0;}).reduce((s,t)=>s+t.income,0);
  return{balance:latestBal,weeklyEarnings:we,transactions:[...txs].reverse().slice(0,50)};
}

function extractLaborData(rows){
  // 労働集計シート: A=日付(0), B=週番号(1), C=陽汰(2), D=蒼汰(3), E=涼汰(4), F=藍汰(5)
  // ※シートには年末まで日付が事前入力されているため、
  //   「金額が入っている最新週」を探す
  const res={yota:0,sota:0,ryota:0,aita:0};
  const cols={yota:2,sota:3,ryota:4,aita:5};

  // 末尾から「いずれかの列に金額がある」最新週を探す
  let latestWeek=-1;
  for(let i=rows.length-1;i>=3;i--){
    const r=rows[i]||[];
    const wk=parseNum(r[1]);
    if(wk<=0)continue;
    const hasData=Object.values(cols).some(col=>parseNum(r[col])>0);
    if(hasData){latestWeek=wk;break;}
  }
  if(latestWeek<0)return res;

  // 最新週の行だけ合計
  for(let i=3;i<rows.length;i++){
    const r=rows[i]||[];
    if(parseNum(r[1])!==latestWeek)continue;
    for(const[id,col]of Object.entries(cols)){
      const v=parseNum(r[col]);
      if(v>0)res[id]+=v;
    }
  }
  return res;
}

function fetchLaborSheet(sheetName){
  return new Promise((resolve,reject)=>{
    const cb="__gasCB_"+Date.now()+"_"+Math.random().toString(36).slice(2);
    const sc=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("タイムアウト"));},15000);
    function cleanup(){clearTimeout(timer);delete window[cb];sc.parentNode&&sc.parentNode.removeChild(sc);}
    window[cb]=json=>{cleanup();json&&json.data?resolve(json.data):reject(new Error(json&&json.error||"データなし"));};
    sc.onerror=()=>{cleanup();reject(new Error("通信エラー"));};
    sc.src=`${LABOR_GAS_URL}?sheet=${encodeURIComponent(sheetName)}&callback=${cb}`;
    document.head.appendChild(sc);
  });
}

function extractLaborSonData(rows, sonId){
  const col=LABOR_COLS[sonId];
  if(!col||!rows||rows.length<6)return null;
  const rankRow=rows[3]||[];
  const unitRow=rows[4]||[];
  const countRow=rows[5]||[];
  const jobs=LABOR_JOB_NAMES.map((name,i)=>{
    const c=col.jobs[i];
    return{name,emoji:LABOR_JOB_EMOJIS[i],rank:String(rankRow[c]||"").trim(),unit:parseNum(unitRow[c]),count:parseNum(countRow[c])};
  });
  const txs=[];
  for(let i=6;i<rows.length;i++){
    const r=rows[i];if(!r)continue;
    const raw=r[col.date];if(!raw)continue;
    const d=fmtDate(raw);if(!d)continue;
    const total=parseNum(r[col.total]);
    const jobAmts=col.jobs.map(c=>parseNum(r[c]));
    if(total>0||jobAmts.some(v=>v>0))txs.push({date:d,total,jobAmts});
  }
  return{jobs,transactions:[...txs].reverse().slice(0,30)};
}

function fmtYen(v){
  if(v>=10000)return(v/10000).toFixed(1).replace(/\.0$/,"")+"万円";
  if(v>=1000)return(v/1000).toFixed(1).replace(/\.0$/,"")+"千円";
  return v+"円";
}

function drawLine(data,color){
  const c=document.getElementById("lineC");if(!c||data.length<2)return;
  const W=c.parentElement.clientWidth-16||340,H=200;c.width=W;c.height=H;
  const ctx=c.getContext("2d"),pad={t:10,r:10,b:30,l:62};
  const vals=data.map(d=>d.balance),minV=Math.min(...vals),maxV=Math.max(...vals),rng=maxV-minV||1;
  const xp=i=>pad.l+(i/(data.length-1))*(W-pad.l-pad.r);
  const yp=v=>pad.t+(1-(v-minV)/rng)*(H-pad.t-pad.b);
  ctx.strokeStyle="#E5E7EB";ctx.lineWidth=1;
  for(let i=0;i<4;i++){
    const y=pad.t+i*(H-pad.t-pad.b)/3;
    const val=Math.round(maxV-i*rng/3);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle="#9CA3AF";ctx.font="9px sans-serif";ctx.textAlign="right";
    ctx.fillText(fmtYen(val),pad.l-3,y+3);
  }
  const step=Math.max(1,Math.floor(data.length/5));
  ctx.fillStyle="#9CA3AF";ctx.font="8px sans-serif";ctx.textAlign="center";
  data.forEach((d,i)=>{if(i%step===0||i===data.length-1)ctx.fillText(d.date.slice(5),xp(i),H-4);});
  ctx.beginPath();ctx.moveTo(xp(0),yp(data[0].balance));
  data.forEach((d,i)=>{if(i>0)ctx.lineTo(xp(i),yp(d.balance));});
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.stroke();
}

function drawBarChart(){
  setTimeout(()=>{
    const c=document.getElementById("barC");if(!c)return;
    const rd=SONS.map(s=>({...s,amount:laborData[s.id]??0})).sort((a,b)=>b.amount-a.amount);
    const W=c.parentElement.clientWidth-16||340,H=160;c.width=W;c.height=H;
    const ctx=c.getContext("2d"),pad={t:16,r:8,b:28,l:8},mx=Math.max(...rd.map(d=>d.amount),1),bw=(W-pad.l-pad.r)/rd.length;
    ctx.clearRect(0,0,W,H);
    rd.forEach((d,i)=>{
      const bh=Math.max((d.amount/mx)*(H-pad.t-pad.b),d.amount>0?2:0);
      const x=pad.l+i*bw+bw*0.15,y=H-pad.b-bh,w=bw*0.7;
      ctx.fillStyle=d.color;ctx.beginPath();
      ctx.roundRect?ctx.roundRect(x,y,w,bh,4):ctx.rect(x,y,w,bh);ctx.fill();
      ctx.fillStyle="#374151";ctx.font="bold 13px sans-serif";ctx.textAlign="center";ctx.fillText(d.name,x+w/2,H-4);
      if(d.amount>0){ctx.font="9px sans-serif";ctx.fillText("¥"+d.amount.toLocaleString(),x+w/2,y-3);}
    });
  },60);
}

function drawAllLineChart(){
  setTimeout(()=>{
    const c=document.getElementById("allLineC");if(!c)return;
    const W=c.parentElement.clientWidth-32||300,H=220;c.width=W;c.height=H;
    const ctx=c.getContext("2d"),pad={t:14,r:10,b:30,l:62};

    // 全員の残高データ収集
    const allSeries=SONS.map(s=>{
      const txs=sonData[s.id]?.transactions??[];
      return{son:s,data:[...txs].reverse().filter(t=>t.balance>0)};
    }).filter(s=>s.data.length>=2);

    if(allSeries.length===0)return;

    // 全データから日付・最大最小を計算
    const allVals=allSeries.flatMap(s=>s.data.map(d=>d.balance));
    const minV=Math.min(...allVals),maxV=Math.max(...allVals),rng=maxV-minV||1;

    // 共通x軸：全員の日付をまとめてソート
    const allDates=[...new Set(allSeries.flatMap(s=>s.data.map(d=>d.date)))].sort();
    const xp=i=>pad.l+(i/(allDates.length-1||1))*(W-pad.l-pad.r);
    const yp=v=>pad.t+(1-(v-minV)/rng)*(H-pad.t-pad.b);

    // グリッド線と縦軸ラベル
    ctx.strokeStyle="#E5E7EB";ctx.lineWidth=1;
    for(let i=0;i<4;i++){
      const y=pad.t+i*(H-pad.t-pad.b)/3;
      const val=Math.round(maxV-i*rng/3);
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
      ctx.fillStyle="#9CA3AF";ctx.font="9px sans-serif";ctx.textAlign="right";
      ctx.fillText(fmtYen(val),pad.l-3,y+3);
    }

    // 横軸ラベル（5個程度）
    const step=Math.max(1,Math.floor(allDates.length/5));
    ctx.fillStyle="#9CA3AF";ctx.font="8px sans-serif";ctx.textAlign="center";
    allDates.forEach((d,i)=>{if(i%step===0||i===allDates.length-1)ctx.fillText(d.slice(5),xp(i),H-4);});

    // 各自の折れ線
    allSeries.forEach(({son,data})=>{
      // 日付→残高マップ（前の値を引き継ぐ）
      const dateMap={};data.forEach(d=>{dateMap[d.date]=d.balance;});
      let lastVal=null;
      const points=[];
      allDates.forEach((date,i)=>{
        if(dateMap[date]!==undefined)lastVal=dateMap[date];
        if(lastVal!==null)points.push({i,v:lastVal});
      });
      if(points.length<2)return;
      ctx.beginPath();ctx.moveTo(xp(points[0].i),yp(points[0].v));
      points.forEach(p=>{ctx.lineTo(xp(p.i),yp(p.v));});
      ctx.strokeStyle=son.color;ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.stroke();

      // 最新値ラベル
      const last=points[points.length-1];
      ctx.fillStyle=son.color;ctx.font="bold 9px sans-serif";ctx.textAlign="left";
      ctx.fillText(son.emoji+"¥"+last.v.toLocaleString(),Math.min(xp(last.i)+2,W-50),yp(last.v)-4);
    });
  },80);
}

    <button class="detail-back" onclick="backToLabor()">← もどる</button>
    <div class="detail-card" style="border:2px solid ${son.color}30;box-shadow:0 4px 20px ${son.color}12">
      <div class="detail-header">
        <div class="detail-avatar" style="background:${son.color}15;border:2px solid ${son.color}30">${son.emoji}</div>
        <div><div class="detail-name">${son.name}</div><div class="detail-name-sub">${son.kanji} の労働実績</div></div>
        <div class="detail-balance-area">
          <div class="detail-balance-label">累計獲得</div>
          <div class="detail-balance" style="color:${son.color};font-size:20px">¥${totalEarned.toLocaleString()}</div>
        </div>
      </div>
    </div>

    <!-- お仕事ごとの資格・回数 -->
    <div class="labor-section-title">🏅 資格・回数</div>
    <div class="labor-price-table">
      <div class="labor-price-header" style="grid-template-columns:1fr 60px 60px 60px">
        <span>お仕事</span><span>資格</span><span>単価</span><span>回数</span>
      </div>
      ${jobs.map((job,i)=>{
        const rc=rankMap[job.rank]||"badge-minarai";
        return`<div class="labor-price-row ${i%2===0?"":"even"}" style="grid-template-columns:1fr 60px 60px 60px">
          <div class="labor-job-name"><span class="labor-job-emoji">${job.emoji}</span>${job.name}</div>
          <div style="text-align:center"><span class="rank-job-badge ${rc}">${job.rank||"見習い"}</span></div>
          <div class="labor-price-cell">¥${job.unit}</div>
          <div class="labor-price-cell" style="color:${son.color};font-weight:900">${job.count}回</div>
        </div>`;
      }).join("")}
    </div>

    <!-- 最近の履歴 -->
    <div class="labor-section-title">📋 最近の労働履歴</div>
    ${txs.length===0?`<div class="empty">まだ実績がありません</div>`:`
    <div class="tx-list">
      ${txs.map((tx,i)=>{
        const details=tx.jobAmts.map((amt,j)=>amt>0?`${LABOR_JOB_EMOJIS[j]}¥${amt}`:"").filter(Boolean).join(" ");
        return`<div class="tx-row ${i%2===0?"even":"odd"}">
          <span class="tx-icon">🛠️</span>
          <div class="tx-info">
            <div class="tx-date">${tx.date}</div>
            <div class="tx-type">${details||"労働"}</div>
          </div>
          <div class="tx-right">
            <div style="font-size:13px;font-weight:800;color:#16A34A;font-variant-numeric:tabular-nums">+¥${tx.total.toLocaleString()}</div>
          </div>
        </div>`;
      }).join("")}
    </div>`}
  </div>`;
}

  return`<div class="page">
    <div style="font-size:17px;font-weight:900;color:#1a1a1a;margin-bottom:14px">🏦 パー銀ルール</div>
    <div class="rules-list">
      ${SONS.map(son=>`<div class="rule-card" style="border:1.5px solid ${son.color}25">
        <div class="rule-header"><span style="font-size:22px">${son.emoji}</span><div class="rule-name">${son.name}（${son.kanji}）</div><span class="tag" style="background:${son.color}12;color:${son.color};margin-left:auto">${son.interestLabel}</span></div>
        <div class="rule-desc">${son.id==="yota"||son.id==="sota"?"毎月末に残高の10%を利息として受け取れます":son.id==="ryota"?"毎週5%の利息＋毎週日曜日にベーシックインカム¥100":"毎週5%の利息がつきます（毎週）"}</div>
      </div>`).join("")}
      <div class="rule-special" style="background:#FFF7ED;border:1.5px solid #FED7AA"><div class="rule-special-title" style="color:#92400E">💸 引き出しルール（🌞 陽汰のみ）</div><div class="rule-special-desc" style="color:#92400E">残高が <strong>¥2,000以上</strong> のとき、残高の <strong>20%以内</strong> まで引き出せます</div></div>
      <div class="rule-special" style="background:#EFF6FF;border:1.5px solid #BFDBFE"><div class="rule-special-title" style="color:#1E40AF">🎯 パー銀の目的</div><div class="rule-special-desc" style="color:#1E40AF">💰 <strong>貯める力</strong>をつける<br>🛠️ <strong>稼ぐ力</strong>をつける（家庭内労働）<br>📈 <strong>お金を育てる</strong>楽しさを学ぶ</div></div>
    </div>
  </div>`;
}

navigate("home");
loadAll();
</script>
